<?xml version="1.0" encoding="UTF-8"?>
<svg width="512" height="512" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg">
  <title>Cuckoo Logo</title>
  <desc>簡潔餐飲系統品牌標識</desc>
  
  <rect width="512" height="512" rx="64" fill="#16213e"/>
  
  <g stroke="#FFFFFF" stroke-width="36" stroke-linecap="round" fill="none">
    <!-- C shape - bowl/plate -->
    <path d="M300 170C300 170 380 200 380 280C380 360 300 390 300 390"/>
    <path d="M250 150C250 150 160 200 160 280C160 360 250 410 250 410" opacity="0.4"/>
    
    <!-- Fork tines -->
    <line x1="340" y1="180" x2="340" y2="120"/>
    <line x1="370" y1="180" x2="370" y2="110"/>
    <line x1="400" y1="180" x2="400" y2="120"/>
  </g>
  
  <!-- Checkmark -->
  <path d="M130 320L210 400L370 240" 
        stroke="#4ade80" stroke-width="40" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
</svg>